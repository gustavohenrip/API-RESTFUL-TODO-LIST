<div class="page">
  <div class="orb orb-a"></div>
  <div class="orb orb-b"></div>
  <div class="orb orb-c"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand" aria-label="Todo">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="todo-brand-gradient" x1="12" y1="10" x2="54" y2="56" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#2aa96d" />
                <stop offset="1" stop-color="#0f5132" />
              </linearGradient>
            </defs>
            <rect x="8" y="8" width="48" height="48" rx="16" fill="url(#todo-brand-gradient)" />
            <path d="M22 16h18l10 10v20c0 4.4-3.6 8-8 8H22c-4.4 0-8-3.6-8-8V24c0-4.4 3.6-8 8-8Z" fill="rgba(255, 255, 255, 0.12)" />
            <path d="M40 16v10h10" stroke="rgba(255, 255, 255, 0.58)" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" />
            <path d="M22 27h18" stroke="rgba(255, 255, 255, 0.34)" stroke-linecap="round" stroke-width="3.2" />
            <path d="M23 34.5l7.2 7.2L44 28" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="4.7" />
            <circle cx="24.5" cy="24.5" r="2.3" fill="rgba(255, 255, 255, 0.76)" />
          </svg>
        </span>
        <span class="brand-name">Todo</span>
      </div>
      @if (signedIn()) {
        <button class="ghost" type="button" (click)="logout()">Sign out</button>
      }
    </header>

    @if (feedback.error()) {
      <p class="notice notice-error">{{ feedback.error() }}</p>
    }

    @if (feedback.message()) {
      <p class="notice">{{ feedback.message() }}</p>
    }

    <router-outlet />
  </main>

  <app-confirm-modal />
</div>

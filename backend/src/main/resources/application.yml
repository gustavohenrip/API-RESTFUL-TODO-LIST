spring:
  application:
    name: todo-backend
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/todo-backend;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  h2:
    console:
      enabled: false

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  jwt:
    issuer: ${APP_JWT_ISSUER:todo-backend}
    secret: ${APP_JWT_SECRET:Z3wjNqsImOtAzFLEdyaYeOtEhgMICc1FGKjQQ2+Ld+lAc62MzNX+j7QntjACdjUB}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:60}

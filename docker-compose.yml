services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todolist}
      POSTGRES_USER: ${POSTGRES_USER:-todolist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todolist}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todolist} -d ${POSTGRES_DB:-todolist}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-todolist}
      DATABASE_USERNAME: ${POSTGRES_USER:-todolist}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-todolist}
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-todo-backend}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:-60}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_PORT:-4200}}
      APP_RATELIMIT_LOGIN_CAPACITY: ${APP_RATELIMIT_LOGIN_CAPACITY:-5}
      APP_RATELIMIT_LOGIN_REFILL_MINUTES: ${APP_RATELIMIT_LOGIN_REFILL_MINUTES:-1}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4200}:80"

volumes:
  postgres-data:
